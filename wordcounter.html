<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Word Counter - Toolz by Diganta</title>
  <link href="[https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap](https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap)" rel="stylesheet">
  <style>
    :root {
      --primary: #f5a623; --primary-light: #ffd280; --primary-dark: #d4880a;
      --primary-glow: rgba(245,166,35,0.15); --primary-soft: #fff8ec;
      --white: #ffffff; --bg: #fffdf7; --border: #f0ddb0;
      --text: #1a1208; --text-muted: #7a6030; --text-faint: #c9a84c;
      --shadow: rgba(245,166,35,0.15); --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    
    /* HEADER & FOOTER */
    .tool-header { background: var(--white); border-bottom: 1px solid var(--border); padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .brand-link { 
      font-size: 1.1rem; 
      font-weight: 700; 
      color: var(--text); 
      text-decoration: none; 
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .brand-link span { color: var(--primary); }
    .header-logo { height: 28px; width: auto; object-fit: contain; }
    .back-link { font-size: 0.82rem; font-weight: 600; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .back-link:hover { color: var(--primary-dark); }
    footer { border-top: 1px solid var(--border); background: var(--white); padding: 22px 40px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-top: auto; }
    .footer-brand { font-size: 0.88rem; font-weight: 700; color: var(--text); }
    .footer-brand span { color: var(--primary); }
    .footer-copy { font-size: 0.71rem; color: var(--text-faint); }

    /* MAIN APP */
    .section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; }
    .page-header { text-align: center; margin-bottom: 30px; }
    .page-header h1 { font-size: 2rem; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
    .page-header p { color: var(--text-muted); margin-top: 8px; font-size: 0.95rem; }

    .card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius); box-shadow: 0 14px 38px var(--shadow); padding: 32px; width: 100%; max-width: 680px; }

    textarea {
      width: 100%; height: 220px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px;
      padding: 16px; font-family: 'DM Sans', sans-serif; font-size: 1rem; color: var(--text); resize: vertical;
      outline: none; transition: border-color 0.2s; line-height: 1.6;
    }
    textarea::placeholder { color: var(--text-faint); }
    textarea:focus { border-color: var(--primary); }

    .stats { display: flex; gap: 14px; margin-top: 24px; flex-wrap: wrap; }
    .stat-box {
      flex: 1; min-width: 140px; background: var(--primary-soft); border: 1.5px solid var(--primary-light);
      border-radius: 12px; padding: 20px 14px; text-align: center;
    }
    .stat-box .count { font-size: 2.2rem; font-weight: 700; color: var(--primary-dark); line-height: 1; }
    .stat-box .label { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); margin-top: 10px; text-transform: uppercase; letter-spacing: 0.05em; }

    .btn-clear {
      margin-top: 24px; width: 100%; padding: 14px; background: var(--primary); color: #fff;
      border: none; border-radius: 50px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s; letter-spacing: 0.02em;
    }
    .btn-clear:hover { background: var(--primary-dark); transform: scale(1.01); }
  </style>
</head>
<body>

  <header class="tool-header">
    <a href="https://toolzbydiganta.github.io/" class="brand-link">
      <img src="logo.png" alt="Toolz Logo" class="header-logo">
      Toolz <span>by Diganta</span>
    </a>
    <a href="https://toolzbydiganta.github.io/" class="back-link">← Back to Tools</a>
  </header>

  <main class="section">
    <div class="page-header">
      <h1>Count Every Details</h1>
      <p>Type or paste your text below to see live word and character counts.</p>
    </div>

    <div class="card">
      <textarea id="txt" placeholder="Start typing or paste your text here..."></textarea>

      <div class="stats">
        <div class="stat-box">
          <div class="count" id="words">0</div>
          <div class="label">Words</div>
        </div>
        <div class="stat-box">
          <div class="count" id="chars">0</div>
          <div class="label">Characters</div>
        </div>
        <div class="stat-box">
          <div class="count" id="chars_no_space">0</div>
          <div class="label">Chars (no spaces)</div>
        </div>
      </div>

      <button class="btn-clear" onclick="clearText()">Clear Text</button>
    </div>
  </main>

  <footer>
    <div class="footer-brand">Toolz <span>by Diganta</span></div>
    <div class="footer-copy">Free tools, always. Made with ☕</div>
  </footer>

  <script>
    const txt = document.getElementById('txt');
    txt.addEventListener('input', update);

    function update() {
      const val = txt.value;
      const words = val.trim() === '' ? 0 : val.trim().split(/\s+/).length;
      document.getElementById('words').textContent = words;
      document.getElementById('chars').textContent = val.length;
      document.getElementById('chars_no_space').textContent = val.replace(/\s/g, '').length;
    }

    function clearText() { txt.value = ''; update(); }
  </script>
</body>
</html>
